name: Integrity

on:
  push: { branches: [main] }
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  checks: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18'
      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key: yarn-v2-${{ runner.os }}-node-18-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-v2-${{ runner.os }}-node-18-
      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: |
          case "$(yarn --version)" in 1.*) echo 'expected up-to-date yarn version'; exit 1 ;; esac
          yarn install --immutable
      - run: yarn lint
      - run: yarn test:workflow-policy
      - run: node scripts/verify-resource-cleanup-contract.mjs .
      - run: yarn test:ci --coverage
      - name: Preserve coverage for isolated upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: ./coverage/lcov.info
          if-no-files-found: error
          retention-days: 1
      - name: Verify generated distribution
        run: |
          yarn build || { echo "build command should always succeed"; exit 61; }
          git diff --exit-code -- dist || { echo "generated dist is stale"; exit 62; }

  upload-trusted-coverage:
    name: Upload trusted coverage
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: coverage
      - name: Upload coverage to Codecov with OIDC
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          use_oidc: true

  upload-tokenless-pr-coverage:
    name: Upload fork and Dependabot coverage without a token
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.pull_request.head.repo.full_name != github.repository ||
      github.event.pull_request.user.login == 'dependabot[bot]')
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: coverage
      - name: Upload unprotected fork or Dependabot coverage without a token
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          override_branch: pr${{ github.event.pull_request.number }}:${{ github.event.pull_request.head.ref }}
          use_oidc: false

  orchestrator-integration:
    name: Orchestrator Integration
    if: >-
      github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    uses: ./.github/workflows/validate-orchestrator-integration.yml
    secrets: inherit
